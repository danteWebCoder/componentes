<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js componentes</title>
    <link rel="stylesheet" href="./paginas/index/index.css">
<!--     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?lofamily=Material+Symbols+Outlined"/>
    <link rel="shortcut icon" href="./recursos/icons/icons8-javascript-50.png" type="image/x-icon">
 --></head>
<body>
    <header>
        <div class="title">Proyecto componentes avanzados 
            <div class="iconJS"></div>
        </div>
        <div class="login filaCentrada">
            <input class="inputText" type="text" name="login" id="login" placeholder="Usuario">
            <div id="botonLogin" class="botonIcono centrado">
                <span class="icono material-symbols-outlined">login</span>
            </div>
            <div class="botonIcono centrado">
                <span class="icono material-symbols-outlined">person_add</span>
                <input type="checkbox" id="signUp" class="inputOculto">
            </div>
        </div>
    </header>

    <main>
        <fondo-matrix velocidad="50" volumen="32" tempoColumnas="600" columnasMax="6"></fondo-matrix>

        <form class="oculto" action="" method="get" id="signupForm">
            <span id="iconoFondoForm" class="material-symbols-outlined iconoAmpliado">sentiment_dissatisfied</span>
            <div class="login centrado botonRadioOculto">Sign Up</div>
            <div class="inputsBox">
                <label class="columnaCentrada espaciadoVertical" for="user">
                    <div class="iconoBox centrado">
                        <span class="material-symbols-outlined iconoForm">account_circle</span>
                        <span class="material-symbols-outlined iconoForm iconoChecked">person_shield</span>
                    </div>
                    <input class="inputText" type="text" name="user" id="user" placeholder="Nombre de usuario">
                </label>
                <label class="columnaCentrada espaciadoVertical" for="pass">
                    <div class="iconoBox">
                        <span class="material-symbols-outlined iconoForm">lock</span>
                        <span class="material-symbols-outlined iconoForm iconoChecked">verified_user</span>
                    </div>
                    <div class="inputFila filaCentrada">
                        <input class="inputText" type="password" name="pass" id="pass" placeholder="Contraseña">
                        <span class="visibilidadBox icono centrado">
                            <span class="visibilidadIcono material-symbols-outlined">visibility_off</span>
                        </span>
                    </div>
                </label>
                <label class="columnaCentrada espaciadoVertical" for="repeatPass">
                    <div class="iconoBox">
                        <span class="material-symbols-outlined iconoForm">password</span>
                        <span class="material-symbols-outlined iconoForm iconoChecked">verified_user</span>
                    </div>
                    <div class="inputFila filaCentrada">
                        <input class="inputText" type="password" name="repeatPass" id="repeatPass" placeholder="Repite contraseña">
                        <span class="visibilidadBox icono centrado">
                            <span class="visibilidadIcono material-symbols-outlined">visibility_off</span>
                        </span>
                    </div>
                </label>
            </div>
            <label class="condiciones filaCentrada">
                <div class="condicionesCheck material-symbols-outlined">
                    <input class="inputOculto" type="checkbox" name="legal" id="legal"> 
                    <span class="material-symbols-outlined iconoCheck">check_small</span>
                </div>
                Acepto las 
                <a class="enlaceCondiciones" href="./paginas/legal/legal.html">&nbsp;condiciones</a>
            </label>
            <div class="botones espaciadoHorizontal">
                <button class="botonIconoLargo centrado" type="submit" id="aceptar" disabled>Aceptar</button>
                <button class="botonIconoLargo centrado" type="button" id="cerrar">Cerrar</button>
            </div>
        </form>

    </main>

    <script src="./paginas/index/scripts/login.js"></script>
    <script src="./paginas/index/scripts/signupForm.js"></script>
    <script type="module" src="./componentes/simples/fondoMatrix.js"></script>
</body>
</html>
